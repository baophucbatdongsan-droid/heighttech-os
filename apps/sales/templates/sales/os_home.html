<!-- FILE: apps/sales/templates/sales/os_home.html -->
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HeightTech • Sales OS</title>
  <style>
    :root{
      --bg:#070a14; --line:rgba(255,255,255,.10);
      --text:#eef3ff; --muted:rgba(238,243,255,.68);
      --brand:#7c3aed; --radius:18px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; padding:12px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(124,58,237,.40), transparent 55%),
        radial-gradient(1000px 600px at 80% 30%, rgba(59,130,246,.18), transparent 55%),
        var(--bg);
      color:var(--text);
    }
    a{color:inherit;text-decoration:none;}
    .wrap{max-width:1100px;margin:0 auto;}
    .top{
      display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;
      padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      backdrop-filter: blur(14px);
    }
    .btn{
      padding:10px 12px;border-radius:14px;border:1px solid var(--line);
      background:rgba(255,255,255,.08);font-weight:900;
    }
    .btn.primary{border:none;background:linear-gradient(135deg, var(--brand), #2563eb);}
    .card{
      margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      backdrop-filter: blur(14px);
    }
    .muted{color:var(--muted);font-size:12px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div style="font-weight:950;">HeightTech • Sales OS</div>
      <div class="muted">Tenant: <b style="color:var(--text)">{{ tid }}</b> • Me: <b style="color:var(--text)">{{ me.username }}</b></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <a class="btn" href="/dashboard/">Dashboard</a>
      <a class="btn primary" href="/work/">Work OS</a>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:950;">Sales đang ở v0</div>
    <div class="muted" style="margin-top:8px;line-height:1.6;">
      OK rồi anh yêu — trang này để không crash route.<br/>
      Bước tiếp theo em nâng thành <b>Deal Pipeline</b> (NEW → QUALIFIED → PROPOSAL → WON/LOST),
      có quick-create + assign owner, đúng style OS và mobile đẹp.
    </div>
  </div>
</div>
</body>
</html>
