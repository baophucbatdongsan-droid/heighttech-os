<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Chọn workspace</title>
  <style>
    body{font-family:Arial;background:#f6f7fb;padding:24px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);max-width:720px}
    button{padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:#111;color:#fff}
    select{padding:10px;border-radius:10px;border:1px solid #ddd;width:100%}
    .muted{color:#888}
  </style>
</head>
<body>
  <div class="card">
    <h2>Chọn Shop để làm việc</h2>

    {% if shops %}
      <form method="post" action="{% url 'workspace:switch_workspace' %}">
        {% csrf_token %}
        <label>Shop</label>
        <select name="shop_id" required>
          {% for s in shops %}
            <option value="{{ s.id }}">{{ s.name }}</option>
          {% endfor %}
        </select>
        <div style="margin-top:12px">
          <button type="submit">Vào làm việc</button>
        </div>
      </form>
    {% else %}
      <p class="muted">Chưa có shop nào trong tenant này.</p>
      <p class="muted">Chạy seed_demo hoặc tạo shop trong admin.</p>
    {% endif %}
  </div>
</body>
</html>
