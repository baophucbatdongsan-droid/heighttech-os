<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select Workspace</title>
  <style>
    body{font-family:Arial;background:#f6f7fb;padding:24px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);max-width:520px}
    select,button{padding:10px 12px;border-radius:10px;border:1px solid #ddd}
    button{cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h2>Chọn Shop để làm việc</h2>

    {% if shops %}
      <form method="post" action="/app/switch/">
        {% csrf_token %}
        <select name="shop_id" required>
          {% for s in shops %}
            <option value="{{ s.id }}">{{ s.name }} (tenant={{ s.tenant_id }})</option>
          {% endfor %}
        </select>
        <button type="submit">Vào làm việc</button>
      </form>
    {% else %}
      <p>Chưa có shop nào được gán cho tài khoản này.</p>
      <p>Tip: vào admin tạo ShopMember cho user hoặc chạy seed_demo.</p>
    {% endif %}
  </div>
</body>
</html>
