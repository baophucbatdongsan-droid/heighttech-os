<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f7fb; padding:24px; }
    .card { max-width:420px; margin:60px auto; background:#fff; padding:22px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    label { display:block; margin-top:12px; font-weight:700; font-size:13px; }
    input { width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; margin-top:6px; }
    button { margin-top:16px; width:100%; padding:10px; border-radius:10px; border:1px solid #111; background:#111; color:#fff; cursor:pointer; }
    .muted { color:#777; font-size:13px; margin-top:10px; }
    .error { background:#fff5f5; border:1px solid #ffd0d0; padding:10px; border-radius:10px; margin-top:12px; color:#c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login</h2>

    {% if form.errors %}
      <div class="error">Sai username/password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Username</label>
      <input name="username" autofocus required>

      <label>Password</label>
      <input name="password" type="password" required>

      <button type="submit">Sign in</button>
    </form>

    <div class="muted">
      Sau khi login xong, bạn vào <b>/dashboard/</b> hoặc <b>/founder/</b>.
    </div>
  </div>
</body>
</html>
