<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select workspace</title>
  <style>
    body{font-family:Arial;background:#f6f7fb;padding:24px;}
    .box{max-width:760px;margin:0 auto;background:#fff;padding:16px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .card{border:1px solid #eee;border-radius:12px;padding:12px;min-width:240px;flex:1}
    button{padding:10px 12px;border:0;border-radius:10px;cursor:pointer}
  </style>
</head>
<body>
  <div class="box">
    <h2>Chọn shop để làm việc</h2>

    <div class="row">
      {% for s in shops %}
      <div class="card">
        <div><b>{{ s.name }}</b></div>
        <div style="color:#777;font-size:12px;margin:6px 0;">
          Tenant: {{ s.tenant.name|default:"-" }}
        </div>

        <form method="post" action="/app/switch/">
          {% csrf_token %}
          <input type="hidden" name="shop_id" value="{{ s.id }}">
          <button type="submit">
            {% if current_shop_id == s.id %}Đang chọn{% else %}Chọn workspace{% endif %}
          </button>
        </form>
      </div>
      {% empty %}
      <div>Chưa có shop nào. Vào admin tạo Shop/ShopMember trước.</div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
