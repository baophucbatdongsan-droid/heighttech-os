<!-- FILE: apps/work/templates/work/os_my_work.html -->
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Work • Work OS</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0b1020;color:#eef3ff;padding:12px;}
    a{color:inherit;text-decoration:none;}
    .wrap{max-width:980px;margin:0 auto;}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      padding:12px;border:1px solid rgba(255,255,255,.10);border-radius:16px;background:rgba(255,255,255,.06);}
    .btn{padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.06);font-weight:800;}
    .btn.primary{border:none;background:linear-gradient(135deg,#7c3aed,#2563eb);}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;}
    .card{margin-top:12px;border:1px solid rgba(255,255,255,.10);border-radius:16px;background:rgba(255,255,255,.06);padding:12px;}
    .item{display:block;border:1px solid rgba(255,255,255,.10);border-radius:14px;background:rgba(0,0,0,.22);padding:12px;margin-top:10px;}
    .t{font-weight:900;}
    .m{margin-top:6px;color:rgba(238,243,255,.68);font-size:12px;display:flex;gap:10px;flex-wrap:wrap;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div style="font-weight:950;">My Work</div>
    <div class="tabs">
      <a class="btn {% if tab == 'open' %}primary{% endif %}" href="/work/my/?tab=open">Open</a>
      <a class="btn {% if tab == 'done' %}primary{% endif %}" href="/work/my/?tab=done">Done</a>
      <a class="btn" href="/work/">OS Board</a>
    </div>
  </div>

  <div class="card">
    {% for it in items %}
      <a class="item" href="/work/item/{{ it.id }}/">
        <div class="t">#{{ it.id }} • {{ it.title }}</div>
        <div class="m">
          <span>Status: <b>{{ it.status }}</b></span>
          <span>Priority: <b>{{ it.priority }}</b></span>
          {% if it.project_id %}<span>Project: <b>#{{ it.project_id }}</b></span>{% endif %}
          {% if it.company_id %}<span>Company: <b>#{{ it.company_id }}</b></span>{% endif %}
        </div>
      </a>
    {% empty %}
      <div style="color:rgba(238,243,255,.68)">No items</div>
    {% endfor %}
  </div>
</div>
</body>
</html>
