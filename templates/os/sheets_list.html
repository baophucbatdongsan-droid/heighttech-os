{% load static %}
<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeightTech Sheets</title>
  <link rel="stylesheet" href="{% static 'os/os.css' %}?v=1" />
  <style>
    .page-wrap{max-width:1180px;margin:0 auto;padding:24px;}
    .page-title{font-size:28px;font-weight:900;}
    .page-sub{margin-top:6px;color:var(--muted);line-height:1.5;}
    .cardx{margin-top:18px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.03);}
    .cardx-h{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);}
    .cardx-b{padding:16px;}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .stack{display:flex;flex-direction:column;gap:12px;}
    .item{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;background:rgba(255,255,255,.025);}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .muted2{color:var(--muted);font-size:13px;}
    @media (max-width: 900px){.grid2{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-title">HeightTech Sheets</div>
    <div class="page-sub">Trang tính nội bộ cho work / contract / content / booking / finance.</div>

    <div class="cardx">
      <div class="cardx-h"><b>Tạo sheet mới</b></div>
      <div class="cardx-b">
        <div class="grid2">
          <input id="sheetName" class="input" placeholder="Tên sheet, ví dụ: KPI Content 70mai tháng 3" />
          <select id="sheetModule" class="input">
            <option value="custom">custom</option>
            <option value="work">work</option>
            <option value="contract">contract</option>
            <option value="content">content</option>
            <option value="finance">finance</option>
            <option value="booking">booking</option>
          </select>
          <select id="sheetLinkedType" class="input">
            <option value="">-- Gắn đối tượng --</option>
            <option value="work">work</option>
            <option value="contract">contract</option>
            <option value="channel_content">channel_content</option>
            <option value="shop">shop</option>
            <option value="company">company</option>
          </select>
          <input id="sheetLinkedId" class="input" placeholder="Linked target ID (nếu có)" />
        </div>

        <div class="row">
          <button class="btn primary" type="button" onclick="createSheet()">Tạo sheet</button>
          <a class="btn" href="/os/">Về OS</a>
        </div>

        <div id="createStatus" class="muted2" style="margin-top:10px;"></div>
      </div>
    </div>

    <div class="cardx">
      <div class="cardx-h"><b>Danh sách sheet</b></div>
      <div class="cardx-b">
        <div id="sheetList" class="stack"></div>
      </div>
    </div>
  </div>

  <script>
    const CURRENT_TENANT_ID = "{{ current_tenant_id|default:''|escapejs }}".trim();
    const LINKED_TARGET_TYPE = new URLSearchParams(window.location.search).get("linked_target_type") || "";
    const LINKED_TARGET_ID = new URLSearchParams(window.location.search).get("linked_target_id") || "";

    function getCookie(name) {
      const m = document.cookie.match(new RegExp("(^|;\\s*)" + name + "=([^;]+)"));
      return m ? decodeURIComponent(m[2]) : "";
    }

    function authHeaders(extra = {}) {
      const headers = Object.assign({}, extra || {});
      if (CURRENT_TENANT_ID) headers["X-Tenant-Id"] = CURRENT_TENANT_ID;
      const csrf = getCookie("csrftoken");
      if (csrf) headers["X-CSRFToken"] = csrf;
      return headers;
    }

    async function readJsonSafe(res) {
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("application/json")) return await res.json();
      const txt = await res.text();
      throw new Error(txt || `HTTP ${res.status}`);
    }

    function setCreateStatus(msg, type="info"){
      const el = document.getElementById("createStatus");
      el.textContent = msg || "";
      el.style.color =
        type === "err" ? "#ff8f9c" :
        type === "ok" ? "#8fe3a1" :
        "#8ab4ff";
    }

    function esc(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    async function loadSheets(){
      const p = new URLSearchParams();
      if (LINKED_TARGET_TYPE) p.set("linked_target_type", LINKED_TARGET_TYPE);
      if (LINKED_TARGET_ID) p.set("linked_target_id", LINKED_TARGET_ID);

      const res = await fetch(`/api/v1/sheets/?${p.toString()}`, {
        credentials: "include",
        headers: authHeaders(),
        cache: "no-store",
      });

      const data = await readJsonSafe(res);
      const box = document.getElementById("sheetList");

      if (!res.ok || !data.ok) {
        box.innerHTML = `<div class="item">Không tải được sheet</div>`;
        return;
      }

      const items = data.items || [];
      if (!items.length) {
        box.innerHTML = `<div class="item">Chưa có sheet</div>`;
        return;
      }

      box.innerHTML = items.map(x => `
        <div class="item">
          <div><b>${esc(x.name)}</b></div>
          <div class="muted2" style="margin-top:6px;">
            Module: ${esc(x.module_code || "-")}
            • Linked: ${esc(x.linked_target_type || "-")} ${esc(x.linked_target_id || "")}
          </div>
          <div class="row">
            <a class="btn primary" href="/os/sheets/${x.id}/">Mở sheet</a>
            <a class="btn" href="/api/v1/sheets/${x.id}/export.xlsx">Export Excel</a>
          </div>
        </div>
      `).join("");
    }

    async function createSheet(){
      const payload = {
        name: document.getElementById("sheetName").value.trim(),
        module_code: document.getElementById("sheetModule").value,
        linked_target_type: document.getElementById("sheetLinkedType").value || LINKED_TARGET_TYPE,
        linked_target_id: document.getElementById("sheetLinkedId").value.trim() || LINKED_TARGET_ID || null,
        columns: [
          { name: "Tên", data_type: "text" },
          { name: "Giá trị", data_type: "text" },
          { name: "Ghi chú", data_type: "text" }
        ]
      };

      if (!payload.name) {
        setCreateStatus("Thiếu tên sheet", "err");
        return;
      }

      setCreateStatus("Đang tạo sheet...", "info");

      const res = await fetch("/api/v1/sheets/create/", {
        method: "POST",
        credentials: "include",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify(payload),
      });

      const data = await readJsonSafe(res);

      if (!res.ok || !data.ok) {
        setCreateStatus(data.message || "Tạo sheet lỗi", "err");
        return;
      }

      setCreateStatus("Đã tạo sheet thành công", "ok");
      window.location.href = `/os/sheets/${data.item.id}/`;
    }

    if (LINKED_TARGET_TYPE && !document.getElementById("sheetLinkedType").value) {
      document.getElementById("sheetLinkedType").value = LINKED_TARGET_TYPE;
    }
    if (LINKED_TARGET_ID && !document.getElementById("sheetLinkedId").value) {
      document.getElementById("sheetLinkedId").value = LINKED_TARGET_ID;
    }

    loadSheets().catch((e) => {
      const box = document.getElementById("sheetList");
      if (box) {
        box.innerHTML = `<div class="item">Load sheets lỗi: ${esc(e.message || e)}</div>`;
      }
    });
  </script>
</body>
</html>
