{% load static %}
<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Content ↔ Work Sync</title>
  <link rel="stylesheet" href="{% static 'os/os.css' %}?v=28" />
  <style>
    .page-wrap{max-width:980px;margin:0 auto;padding:24px;}
    .page-title{font-size:28px;font-weight:900;}
    .page-sub{color:var(--muted);margin-top:6px;line-height:1.5;}
    .cardx{
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      background:rgba(255,255,255,.03);
      padding:18px;
      margin-top:20px;
    }
    .status-line{
      margin-top:14px;
      font-size:13px;
      min-height:20px;
      color:var(--muted);
      line-height:1.5;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-title">Content ↔ Work Sync</div>
    <div class="page-sub">
      Đồng bộ ngược từ task của team về trạng thái content để tạo vòng vận hành khép kín.
    </div>

    <div class="cardx">
      <div class="muted" style="margin-bottom:8px;">WorkItem ID</div>
      <input id="workitemId" class="input" placeholder="VD: 3 hoặc #3" />

      <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn primary" type="button" onclick="syncContent()">Sync content từ task</button>

        {% if contract_id %}
          <a class="btn" href="/os/contracts/{{ contract_id }}/content/">Về Content Studio</a>
        {% endif %}
      </div>

      <div id="syncStatus" class="status-line"></div>
    </div>
  </div>

  <script>
    const CURRENT_TENANT_ID = "{{ current_tenant_id|default:''|escapejs }}".trim();
    const CONTRACT_ID = "{{ contract_id|default:''|escapejs }}".trim();
    const PRESET_CONTENT_ID = "{{ request.GET.content_id|default:''|escapejs }}".trim();

    function getCookie(name) {
      const m = document.cookie.match(new RegExp("(^|;\\s*)" + name + "=([^;]+)"));
      return m ? decodeURIComponent(m[2]) : "";
    }

    function authHeaders(extra = {}) {
      const headers = Object.assign({}, extra || {});
      if (CURRENT_TENANT_ID) headers["X-Tenant-Id"] = CURRENT_TENANT_ID;
      const csrf = getCookie("csrftoken");
      if (csrf) headers["X-CSRFToken"] = csrf;
      return headers;
    }

    async function readJsonSafe(res) {
      const ct = res.headers.get("content-type") || "";

      if (ct.includes("application/json")) {
        return await res.json();
      }

      const txt = await res.text();
      throw new Error(txt || `HTTP ${res.status}`);
    }

    function setStatus(msg, type = "info") {
      const el = document.getElementById("syncStatus");
      el.textContent = msg || "";
      el.style.color =
        type === "err" ? "#ff8f9c" :
        type === "ok" ? "#8fe3a1" :
        "#8ab4ff";
    }

    function normalizeWorkItemId(raw) {
      return String(raw || "").trim().replace(/\D/g, "");
    }

    function resolveContentId(data) {
      return String(
        data?.content_id ||
        data?.content?.id ||
        data?.item?.content_id ||
        data?.item?.id ||
        PRESET_CONTENT_ID ||
        ""
      ).trim();
    }

    function resolveContractId(data) {
      return String(
        CONTRACT_ID ||
        data?.contract_id ||
        data?.content?.contract_id ||
        data?.item?.contract_id ||
        ""
      ).trim();
    }

    function nextStudioUrl(contractId, contentId) {
      if (!contractId) return "";
      const p = new URLSearchParams();
      if (contentId) p.set("content_id", contentId);
      const qs = p.toString();
      return `/os/contracts/${encodeURIComponent(contractId)}/content/${qs ? `?${qs}` : ""}`;
    }

    async function syncContent() {
      const rawInput = document.getElementById("workitemId").value || "";
      const workitemId = normalizeWorkItemId(rawInput);

      if (!workitemId) {
        setStatus("Thiếu WorkItem ID hợp lệ", "err");
        return;
      }

      setStatus("Đang sync content từ task...", "info");

      try {
        const res = await fetch(`/api/v1/work-items/${workitemId}/sync-content/`, {
          method: "POST",
          credentials: "include",
          headers: authHeaders({
            "Content-Type": "application/json",
            "Accept": "application/json",
            "X-Requested-With": "XMLHttpRequest"
          }),
          body: JSON.stringify({})
        });

        const data = await readJsonSafe(res);

        if (!res.ok || !data.ok) {
          setStatus(data.message || "Sync thất bại", "err");
          return;
        }

        const contentId = resolveContentId(data);
        const contractId = resolveContractId(data);
        const studioUrl = nextStudioUrl(contractId, contentId);

        console.log("SYNC RESULT", {
          contractId,
          contentId,
          studioUrl,
          data
        });

        setStatus(
          `Đã sync thành công. Content #${contentId || "?"} → status = ${data.content_status || "-"}. Đang chuyển sang Content Studio...`,
          "ok"
        );

        if (studioUrl) {
          window.location.href = studioUrl;
          return;
        }

        setStatus(
          `Đã sync thành công nhưng chưa xác định được trang đích. contract_id=${contractId || "-"} • content_id=${contentId || "-"}`,
          "err"
        );
      } catch (err) {
        setStatus("Lỗi sync: " + (err.message || err), "err");
      }
    }
  </script>
</body>
</html>
