{% load static %}
<!doctype html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Channel Content Studio</title>

<link rel="stylesheet" href="{% static 'os/os.css' %}?v=23">

<style>
.page-wrap{
  max-width:1320px;
  margin:0 auto;
  padding:24px;
}
.page-title{
  font-size:32px;
  font-weight:900;
  margin-bottom:10px;
  letter-spacing:-.03em;
}
.page-sub{
  color:var(--muted);
  margin-bottom:14px;
  line-height:1.65;
}
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.stack{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.item{
  border:1px solid rgba(255,255,255,.08);
  padding:18px;
  border-radius:22px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.025));
  box-shadow:0 14px 36px rgba(0,0,0,.14);
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}
.input{
  width:100%;
  padding:11px 12px;
  border-radius:12px;
  background:#0d1118;
  border:1px solid rgba(255,255,255,.10);
  color:#fff;
  outline:none;
}
.input:focus{
  border-color:rgba(138,180,255,.45);
  box-shadow:0 0 0 3px rgba(138,180,255,.10);
}
.tag{
  padding:5px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  font-size:12px;
  color:#dbe6ff;
}
button{
  padding:9px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#334155;
  color:white;
}
button:hover{
  opacity:.94;
}
.actions-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.status-box{
  min-height:20px;
  font-size:13px;
  margin-top:10px;
  color:var(--muted);
}
.attach-box{
  margin-top:16px;
  padding-top:14px;
  border-top:1px dashed rgba(255,255,255,.10);
}
.attach-title{
  font-size:14px;
  font-weight:800;
  margin-bottom:10px;
}
.attach-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}
.attach-item{
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:10px 12px;
  background:rgba(255,255,255,.02);
}
.attach-name{
  font-weight:700;
}
.attach-meta{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}
.attach-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}
.attach-empty{
  color:var(--muted);
  font-size:13px;
}

.create-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.create-grid .full{
  grid-column:1 / -1;
}

.content-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  align-items:flex-start;
}
.content-title{
  font-size:22px;
  font-weight:900;
  line-height:1.3;
}
.content-script{
  margin-top:12px;
  white-space:pre-wrap;
  line-height:1.8;
  color:#eef3ff;
  border:1px solid rgba(255,255,255,.06);
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,.02);
}
.section-divider{
  margin:16px 0;
  border:none;
  border-top:1px solid rgba(255,255,255,.07);
}

.metric-shell{
  margin-top:16px;
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:14px;
}
.metric-panel{
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  overflow:hidden;
  background:rgba(255,255,255,.02);
}
.metric-panel-head{
  padding:13px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.metric-panel-title{
  font-weight:900;
  font-size:15px;
}
.metric-sub{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}

.metric-score{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.score-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.04);
}
.score-ok{
  color:#9ef0b0;
  border-color:rgba(50,220,110,.25);
  background:rgba(50,220,110,.08);
}
.score-mid{
  color:#ffd98f;
  border-color:rgba(255,200,80,.25);
  background:rgba(255,200,80,.08);
}
.score-low{
  color:#ff9fa8;
  border-color:rgba(255,90,120,.25);
  background:rgba(255,90,120,.08);
}

.metric-kpis{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  padding:14px;
}
.metric-kpi{
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:12px;
  background:rgba(255,255,255,.025);
  position:relative;
  overflow:hidden;
}
.metric-kpi::after{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:3px;
  background:rgba(255,255,255,.08);
}
.metric-kpi.good::after{background:#29d66f;}
.metric-kpi.mid::after{background:#f6b73c;}
.metric-kpi.low::after{background:#ff6b7c;}

.metric-kpi-label{
  font-size:12px;
  color:var(--muted);
}
.metric-kpi-value{
  margin-top:6px;
  font-size:22px;
  font-weight:900;
  letter-spacing:-.02em;
}
.metric-kpi-note{
  margin-top:5px;
  font-size:11px;
  color:var(--muted);
}

.metric-edit{
  padding:14px;
}
.metric-edit-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.metric-field label{
  display:block;
  margin-bottom:6px;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}

.quick-summary{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.summary-box{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.025);
  border-radius:16px;
  padding:13px;
}
.summary-title{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}
.summary-value{
  margin-top:8px;
  font-size:18px;
  font-weight:900;
}
.summary-hint{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}

.sparkline{
  height:64px;
  border-radius:14px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.07);
  position:relative;
  overflow:hidden;
}
.sparkline-bars{
  position:absolute;
  inset:10px 10px 10px 10px;
  display:flex;
  align-items:flex-end;
  gap:6px;
}
.sparkline-bar{
  flex:1;
  border-radius:8px 8px 0 0;
  background:linear-gradient(180deg, rgba(138,180,255,.95), rgba(86,130,255,.55));
  min-height:10%;
  opacity:.95;
}

.studio-box{
  margin-top:14px;
  border-top:1px dashed rgba(255,255,255,.10);
  padding-top:14px;
}
.studio-card{
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  background:rgba(255,255,255,.02);
}
.studio-title{
  font-weight:900;
}
.studio-meta{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
  line-height:1.6;
}

.top-flags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.flag-chip{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  border:1px solid rgba(255,255,255,.08);
}
.flag-good{
  color:#a6efba;
  background:rgba(41,214,111,.10);
}
.flag-mid{
  color:#ffd48b;
  background:rgba(246,183,60,.10);
}
.flag-low{
  color:#ffadb5;
  background:rgba(255,107,124,.10);
}

@media (max-width: 1100px){
  .metric-shell{
    grid-template-columns:1fr;
  }
}
@media (max-width: 980px){
  .create-grid,
  .metric-edit-grid,
  .metric-kpis{
    grid-template-columns:1fr;
  }
  .page-wrap{
    padding:14px;
  }
}
</style>
</head>

<body>
<div class="page-wrap">
  <div class="page-title">Channel Content Studio</div>
  <div class="page-sub">
    Quản lý nội dung theo từng hợp đồng, theo dõi AI score, trạng thái air và hiệu quả nội dung.
  </div>

  <div class="toolbar">
    <a class="btn" href="/os/contracts/{{ contract_id }}/">← Quay lại hợp đồng</a>
    <a class="btn primary" href="/os/content-work-sync/?contract_id={{ contract_id }}">Viết content</a>
    <a class="btn" href="/os/founder/content-ai/">AI Content</a>
    <a class="btn" href="/os/founder/content-priority/">Ưu tiên content</a>
  </div>

  <div class="stack">
    <div class="item">
      <h3 style="margin-top:0;">Tạo nội dung mới</h3>

      <div class="create-grid">
        <input id="title" class="input full" placeholder="Tiêu đề video">
        <input id="pillar" class="input full" placeholder="Trụ cột nội dung">
        <textarea id="script" class="input full" placeholder="Kịch bản video" style="min-height:140px;"></textarea>
      </div>

      <div class="actions-row">
        <button onclick="createContent()">Tạo content</button>
        <a class="btn" href="/os/content-work-sync/?contract_id={{ contract_id }}">Đi tới viết content</a>
      </div>

      <div id="createStatus" class="status-box"></div>
    </div>

    <div id="contentList" class="stack"></div>
  </div>
</div>

<script>
const CONTRACT_ID = {{ contract_id }};
const CURRENT_TENANT_ID = "{{ current_tenant_id|default:''|escapejs }}".trim();

function getCookie(name) {
  const m = document.cookie.match(new RegExp("(^|;\\s*)" + name + "=([^;]+)"));
  return m ? decodeURIComponent(m[2]) : "";
}

function authHeaders(extra = {}) {
  const headers = Object.assign({}, extra || {});
  if (CURRENT_TENANT_ID) headers["X-Tenant-Id"] = CURRENT_TENANT_ID;
  const csrf = getCookie("csrftoken");
  if (csrf) headers["X-CSRFToken"] = csrf;
  return headers;
}

function entityHeaders(extra = {}) {
  const headers = Object.assign({}, extra || {});
  const csrf = getCookie("csrftoken");
  if (csrf) headers["X-CSRFToken"] = csrf;
  if (CURRENT_TENANT_ID) headers["X-Tenant-Id"] = CURRENT_TENANT_ID;
  return headers;
}

function setCreateStatus(msg, type="info"){
  const el = document.getElementById("createStatus");
  el.textContent = msg || "";
  el.style.color = type === "err" ? "#ff8f9c" : type === "ok" ? "#8fe3a1" : "#8ab4ff";
}

async function readJsonSafe(res){
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return await res.json();
  const txt = await res.text();
  throw new Error(txt || `HTTP ${res.status}`);
}

function escapeHtml(v){
  return String(v ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeInt(v){
  const s = String(v ?? "").trim();
  if (!s) return "";
  const n = Number(String(s).replaceAll(",", ""));
  return Number.isFinite(n) ? String(Math.trunc(n)) : "";
}

function formatNumber(v){
  const n = Number(String(v ?? 0).replaceAll(",", ""));
  return Number.isFinite(n) ? n.toLocaleString("vi-VN") : "0";
}

function formatMoney(v){
  const n = Number(String(v ?? 0).replaceAll(",", ""));
  return Number.isFinite(n) ? `${n.toLocaleString("vi-VN")} đ` : "0 đ";
}

function safeNumber(v){
  const n = Number(String(v ?? 0).replaceAll(",", ""));
  return Number.isFinite(n) ? n : 0;
}

function buildCreateTaskUrlForContent(x){
  const p = new URLSearchParams();
  p.set("open_create_task", "1");
  p.set("target_type", "contract_channel_content");
  p.set("target_id", String(x.id));
  p.set("title", x.title ? `Viết content: ${x.title}` : `Viết content #${x.id}`);

  const companyId = normalizeInt(x.company_id);
  const shopId = normalizeInt(x.shop_id);
  const projectId = normalizeInt(x.project_id);

  if (companyId) p.set("company_id", companyId);
  if (shopId) p.set("shop_id", shopId);
  if (projectId) p.set("project_id", projectId);

  if (x.company_name) p.set("company_label", x.company_name);
  if (x.shop_name) p.set("shop_label", x.shop_name);
  if (x.project_name) p.set("project_label", x.project_name);
  if (x.title) p.set("content_label", x.title);
  if (x.contract_code) p.set("contract_label", x.contract_code);

  return `/os/?${p.toString()}`;
}

async function fetchAiScore(contentId){
  try{
    const res = await fetch(`/api/v1/channel-content/${contentId}/ai-score/`, {
      credentials: "include",
      headers: authHeaders()
    });
    const data = await readJsonSafe(res);
    if (!res.ok || !data.ok) return null;
    return data.ai || null;
  }catch(err){
    return null;
  }
}

function aiBadge(ai){
  if (!ai) return `<span class="tag">AI • no data</span>`;

  let tone = "#666";
  if (ai.label === "boostable") tone = "#1f8f4e";
  else if (ai.label === "normal") tone = "#5874d8";
  else if (ai.label === "weak-conversion") tone = "#a97818";
  else if (ai.label === "weak") tone = "#a13d3d";

  return `
    <span class="tag" style="border:1px solid ${tone}; color:${tone}; background:transparent;">
      AI ${escapeHtml(ai.health_score)} • ${escapeHtml(ai.label)}
    </span>
  `;
}

function renderAttachmentList(boxId, items){
  const box = document.getElementById(boxId);
  if (!box) return;

  if (!items.length) {
    box.innerHTML = `<div class="attach-empty">Chưa có file</div>`;
    return;
  }

  box.innerHTML = items.map(x => `
    <div class="attach-item">
      <div class="attach-name">${escapeHtml(x.original_name || x.file_name || ("File #" + x.id))}</div>
      <div class="attach-meta">${escapeHtml(x.content_type || "-")} • ${Number(x.file_size || 0).toLocaleString("vi-VN")} bytes</div>
      <div class="attach-actions">
        <a class="btn" href="${x.viewer_url}" target="_blank" rel="noopener">Mở trong OS</a>
        <a class="btn" href="${x.preview_url}" target="_blank" rel="noopener">Preview</a>
        <a class="btn" href="${x.download_url}" target="_blank" rel="noopener">Tải file</a>
      </div>
    </div>
  `).join("");
}

async function loadEntityAttachments(targetType, targetId, boxId) {
  const res = await fetch(`/api/v1/os/attachments/${targetType}/${targetId}/`, {
    credentials: "include",
    headers: entityHeaders(),
    cache: "no-store",
  });

  const data = await readJsonSafe(res);
  const box = document.getElementById(boxId);
  if (!box) return;

  if (!res.ok || !data.ok) {
    box.innerHTML = `<div class="attach-empty">Không tải được file</div>`;
    return;
  }

  renderAttachmentList(boxId, data.items || []);
}

async function uploadEntityAttachment(targetType, targetId, inputId, boxId) {
  const input = document.getElementById(inputId);
  const file = input?.files?.[0];
  if (!file) {
    alert("Chọn file trước đã anh");
    return;
  }

  const form = new FormData();
  form.append("file", file);

  const res = await fetch(`/api/v1/os/attachments/${targetType}/${targetId}/upload/`, {
    method: "POST",
    credentials: "include",
    headers: entityHeaders(),
    body: form,
  });

  const ct = res.headers.get("content-type") || "";
  const data = ct.includes("application/json") ? await res.json() : await res.text();

  if (!res.ok || !data.ok) {
    alert(data.message || "Upload file lỗi");
    return;
  }

  input.value = "";
  await loadEntityAttachments(targetType, targetId, boxId);
}

function metricClassByValue(kind, value){
  const n = safeNumber(value);

  if (kind === "views") {
    if (n >= 100000) return "good";
    if (n >= 10000) return "mid";
    return "low";
  }

  if (kind === "orders") {
    if (n >= 20) return "good";
    if (n >= 5) return "mid";
    return "low";
  }

  if (kind === "revenue") {
    if (n >= 20000000) return "good";
    if (n >= 5000000) return "mid";
    return "low";
  }

  return n > 0 ? "mid" : "low";
}

function computeContentScore(x){
  const views = safeNumber(x.views);
  const likes = safeNumber(x.likes);
  const comments = safeNumber(x.comments);
  const shares = safeNumber(x.shares);
  const orders = safeNumber(x.orders);
  const revenue = safeNumber(x.revenue);

  let score = 0;
  score += Math.min(views / 2000, 35);
  score += Math.min((likes + comments * 2 + shares * 3) / 50, 25);
  score += Math.min(orders * 4, 25);
  score += Math.min(revenue / 1000000, 15);

  return Math.round(score);
}

function scoreTone(score){
  if (score >= 70) return "score-ok";
  if (score >= 35) return "score-mid";
  return "score-low";
}

function scoreText(score){
  if (score >= 70) return "Hiệu suất mạnh";
  if (score >= 35) return "Có thể tối ưu thêm";
  return "Hiệu suất yếu";
}

function healthFlags(x){
  const flags = [];
  const views = safeNumber(x.views);
  const orders = safeNumber(x.orders);
  const revenue = safeNumber(x.revenue);
  const interactions = safeNumber(x.likes) + safeNumber(x.comments) + safeNumber(x.shares);

  if (views >= 100000) flags.push(`<span class="flag-chip flag-good">Phủ tốt</span>`);
  else if (views >= 10000) flags.push(`<span class="flag-chip flag-mid">Phủ trung bình</span>`);
  else flags.push(`<span class="flag-chip flag-low">Phủ thấp</span>`);

  if (orders >= 10) flags.push(`<span class="flag-chip flag-good">Ra đơn tốt</span>`);
  else if (orders >= 1) flags.push(`<span class="flag-chip flag-mid">Có ra đơn</span>`);
  else flags.push(`<span class="flag-chip flag-low">Chưa ra đơn</span>`);

  if (interactions >= 500) flags.push(`<span class="flag-chip flag-good">Tương tác khỏe</span>`);
  else if (interactions >= 50) flags.push(`<span class="flag-chip flag-mid">Tương tác vừa</span>`);
  else flags.push(`<span class="flag-chip flag-low">Tương tác yếu</span>`);

  if (revenue >= 10000000) flags.push(`<span class="flag-chip flag-good">GMV ổn</span>`);
  else if (revenue > 0) flags.push(`<span class="flag-chip flag-mid">Có GMV</span>`);
  else flags.push(`<span class="flag-chip flag-low">Chưa có GMV</span>`);

  return flags.join("");
}

function buildSparkline(x){
  const values = [
    Math.max(10, Math.min(100, safeNumber(x.likes) / 10)),
    Math.max(10, Math.min(100, safeNumber(x.comments) * 2)),
    Math.max(10, Math.min(100, safeNumber(x.shares) * 3)),
    Math.max(10, Math.min(100, safeNumber(x.orders) * 8)),
    Math.max(10, Math.min(100, safeNumber(x.views) / 2000)),
    Math.max(10, Math.min(100, safeNumber(x.revenue) / 200000)),
  ];

  return `
    <div class="sparkline">
      <div class="sparkline-bars">
        ${values.map(v => `<div class="sparkline-bar" style="height:${v}%"></div>`).join("")}
      </div>
    </div>
  `;
}

async function loadContent(){
  const res = await fetch(`/api/v1/contracts/${CONTRACT_ID}/channel-content/`, {
    credentials:"include",
    headers: authHeaders()
  });

  const data = await readJsonSafe(res);
  const box = document.getElementById("contentList");

  if (!data.items || !data.items.length){
    box.innerHTML = "<div class='item'>Chưa có content</div>";
    return;
  }

  const htmlParts = [];

  for (const x of data.items){
    const ai = await fetchAiScore(x.id);
    const createTaskUrl = buildCreateTaskUrlForContent(x);
    const attachInputId = `contentAttachmentInput_${x.id}`;
    const attachListId = `contentAttachmentList_${x.id}`;
    const metricViewsId = `metric_views_${x.id}`;
    const metricLikesId = `metric_likes_${x.id}`;
    const metricCommentsId = `metric_comments_${x.id}`;
    const metricSharesId = `metric_shares_${x.id}`;
    const metricOrdersId = `metric_orders_${x.id}`;
    const metricRevenueId = `metric_revenue_${x.id}`;

    const score = computeContentScore(x);

    htmlParts.push(`
      <div class="item">
        <div class="content-head">
          <div>
            <div class="content-title">${escapeHtml(x.title)}</div>

            <div class="row">
              <span class="tag">${escapeHtml(x.status)}</span>
              ${x.visible_to_client ? "<span class='tag'>client thấy</span>" : ""}
              ${aiBadge(ai)}
              <span class="tag">content_id: ${escapeHtml(x.id)}</span>
              ${x.content_pillar ? `<span class="tag">${escapeHtml(x.content_pillar)}</span>` : ""}
            </div>

            <div class="top-flags">
              ${healthFlags(x)}
            </div>
          </div>

          <div class="metric-score">
            <div class="score-pill ${scoreTone(score)}">
              Score ${score}/100 • ${scoreText(score)}
            </div>

            <div class="actions-row" style="margin-top:0;">
              <button onclick="markAired(${x.id})">Đã air</button>
              <a class="btn" href="/os/docs/?linked_target_type=channel_content&linked_target_id=${x.id}">Studio doc</a>
              <a class="btn" href="${createTaskUrl}">Tạo task content</a>
              <a class="btn" href="/os/content-work-sync/?contract_id=${CONTRACT_ID}&content_id=${x.id}">Viết tiếp</a>
            </div>
          </div>
        </div>

        ${x.script_text ? `<div class="content-script">${escapeHtml(x.script_text)}</div>` : ``}

        ${ai ? `
          <div style="margin-top:12px; color:#bbb; font-size:13px; line-height:1.6;">
            <b>AI nhận định:</b> ${escapeHtml(ai.recommendation)}
          </div>
        ` : ""}

        <div class="studio-box">
          <div class="studio-card">
            <div class="studio-title">Document Studio của content</div>
            <div class="studio-meta">Vào đúng khu soạn thảo tài liệu cho content này: brief, proposal, script nâng cấp, bảng hạng mục, checklist.</div>
            <div class="actions-row">
              <a class="btn" href="/os/docs/?linked_target_type=channel_content&linked_target_id=${x.id}">Mở / tạo studio doc</a>
            </div>
          </div>
        </div>

        <div class="metric-shell">
          <div class="metric-panel">
            <div class="metric-panel-head">
              <div>
                <div class="metric-panel-title">Hiệu quả nội dung</div>
                <div class="metric-sub">
                  Snapshot mới nhất ${x.metric_date ? `• ngày ${escapeHtml(x.metric_date)}` : ``}
                </div>
              </div>
            </div>

            <div class="metric-kpis">
              <div class="metric-kpi ${metricClassByValue('views', x.views)}">
                <div class="metric-kpi-label">Views</div>
                <div class="metric-kpi-value">${formatNumber(x.views)}</div>
                                <div class="metric-kpi-note">Độ phủ hiện tại</div>
              </div>

              <div class="metric-kpi ${metricClassByValue('orders', x.orders)}">
                <div class="metric-kpi-label">Orders</div>
                <div class="metric-kpi-value">${formatNumber(x.orders)}</div>
                <div class="metric-kpi-note">Khả năng chuyển đổi</div>
              </div>

              <div class="metric-kpi ${metricClassByValue('revenue', x.revenue)}">
                <div class="metric-kpi-label">Revenue</div>
                <div class="metric-kpi-value" style="font-size:18px;">${formatMoney(x.revenue)}</div>
                <div class="metric-kpi-note">Giá trị tạo ra</div>
              </div>

              <div class="metric-kpi ${metricClassByValue('views', x.likes + x.comments + x.shares)}">
                <div class="metric-kpi-label">Likes / Comments / Shares</div>
                <div class="metric-kpi-value" style="font-size:18px;">
                  ${formatNumber(x.likes)} / ${formatNumber(x.comments)} / ${formatNumber(x.shares)}
                </div>
                <div class="metric-kpi-note">Chất lượng tương tác</div>
              </div>

              <div class="metric-kpi ${metricClassByValue('orders', safeNumber(x.orders) > 0 ? safeNumber(x.revenue) / Math.max(safeNumber(x.orders),1) : 0)}">
                <div class="metric-kpi-label">Revenue / Order</div>
                <div class="metric-kpi-value" style="font-size:18px;">
                  ${formatMoney(safeNumber(x.orders) > 0 ? (safeNumber(x.revenue) / Math.max(safeNumber(x.orders),1)) : 0)}
                </div>
                <div class="metric-kpi-note">Giá trị trên mỗi đơn</div>
              </div>

              <div class="metric-kpi ${metricClassByValue('orders', safeNumber(x.views) > 0 ? (safeNumber(x.orders) / safeNumber(x.views)) * 100000 : 0)}">
                <div class="metric-kpi-label">CVR thô</div>
                <div class="metric-kpi-value" style="font-size:18px;">
                  ${(safeNumber(x.views) > 0 ? ((safeNumber(x.orders) / safeNumber(x.views)) * 100).toFixed(2) : "0.00")}%
                </div>
                <div class="metric-kpi-note">Tỷ lệ chuyển đổi theo view</div>
              </div>
            </div>

            <div class="metric-edit">
              <div class="metric-edit-grid">
                <div class="metric-field">
                  <label>Views</label>
                  <input id="${metricViewsId}" class="input" value="${escapeHtml(x.views || 0)}">
                </div>
                <div class="metric-field">
                  <label>Likes</label>
                  <input id="${metricLikesId}" class="input" value="${escapeHtml(x.likes || 0)}">
                </div>
                <div class="metric-field">
                  <label>Comments</label>
                  <input id="${metricCommentsId}" class="input" value="${escapeHtml(x.comments || 0)}">
                </div>
                <div class="metric-field">
                  <label>Shares</label>
                  <input id="${metricSharesId}" class="input" value="${escapeHtml(x.shares || 0)}">
                </div>
                <div class="metric-field">
                  <label>Orders</label>
                  <input id="${metricOrdersId}" class="input" value="${escapeHtml(x.orders || 0)}">
                </div>
                <div class="metric-field">
                  <label>Revenue</label>
                  <input id="${metricRevenueId}" class="input" value="${escapeHtml(x.revenue || 0)}">
                </div>
              </div>

              <div class="actions-row">
                <button onclick="saveMetricInline(${x.id})">Lưu metric</button>
              </div>
            </div>
          </div>

          <div class="metric-panel">
            <div class="metric-panel-head">
              <div>
                <div class="metric-panel-title">Insight nhanh</div>
                <div class="metric-sub">Đọc nhanh hiệu suất và hướng xử lý tiếp theo</div>
              </div>
            </div>

            <div class="quick-summary">
              <div class="summary-box">
                <div class="summary-title">Đánh giá tổng thể</div>
                <div class="summary-value">${scoreText(score)}</div>
                <div class="summary-hint">
                  ${score >= 70
                    ? "Nội dung này đang có tín hiệu tốt. Nên ưu tiên nhân bản format, tiếp tục kéo traffic và tối ưu CTA."
                    : score >= 35
                    ? "Nội dung có nền tảng nhưng chưa bứt lên mạnh. Nên tối ưu hook, caption, CTA và nhịp phân phối."
                    : "Nội dung đang yếu. Cần xem lại hook 3 giây đầu, góc nội dung, target người xem và lời kêu gọi hành động."}
                </div>
              </div>

              <div class="summary-box">
                <div class="summary-title">Ưu tiên hành động</div>
                <div class="summary-hint">
                  ${safeNumber(x.views) < 10000
                    ? "• Tăng phân phối và tối ưu hook để đẩy view.<br>"
                    : ""}
                  ${safeNumber(x.views) >= 10000 && safeNumber(x.orders) < 3
                    ? "• View có nhưng chuyển đổi còn yếu, cần chỉnh CTA / offer / landing.<br>"
                    : ""}
                  ${safeNumber(x.likes) + safeNumber(x.comments) + safeNumber(x.shares) < 50
                    ? "• Tương tác thấp, nên thử format cảm xúc / phản biện / before-after.<br>"
                    : ""}
                  ${safeNumber(x.revenue) > 0
                    ? "• Đã có doanh thu, nên theo dõi để scale có kiểm soát."
                    : "• Chưa có doanh thu, cần thử lại angle nội dung và sản phẩm chốt đơn."}
                </div>
              </div>

              <div class="summary-box">
                <div class="summary-title">Mini trend</div>
                ${buildSparkline(x)}
                <div class="summary-hint">
                  Bar mô phỏng: likes → comments → shares → orders → views → revenue
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="attach-box">
          <div class="attach-title">File của content này</div>
          <div class="actions-row">
            <input id="${attachInputId}" class="input" type="file" />
            <button onclick="uploadEntityAttachment('channel_content', ${x.id}, '${attachInputId}', '${attachListId}')">
              Upload file
            </button>
          </div>
          <div id="${attachListId}" class="attach-list"></div>
        </div>
      </div>
    `);
  }

  box.innerHTML = htmlParts.join("");

  for (const x of data.items) {
    await loadEntityAttachments("channel_content", x.id, `contentAttachmentList_${x.id}`);
  }
}

async function createContent(){
  const payload = {
    title: document.getElementById("title").value.trim(),
    script_text: document.getElementById("script").value.trim(),
    content_pillar: document.getElementById("pillar").value.trim()
  };

  if (!payload.title) {
    setCreateStatus("Thiếu tiêu đề content", "err");
    return;
  }

  setCreateStatus("Đang tạo content...", "info");

  const res = await fetch(`/api/v1/contracts/${CONTRACT_ID}/channel-content/create/`, {
    method:"POST",
    credentials:"include",
    headers: authHeaders({"Content-Type":"application/json"}),
    body:JSON.stringify(payload)
  });

  const data = await readJsonSafe(res);

  if (!res.ok || !data.ok) {
    setCreateStatus(data.message || "Tạo content thất bại", "err");
    return;
  }

  document.getElementById("title").value = "";
  document.getElementById("script").value = "";
  document.getElementById("pillar").value = "";

  setCreateStatus("Tạo content thành công", "ok");
  loadContent();
}

async function markAired(id){
  const res = await fetch(`/api/v1/channel-content/${id}/update/`, {
    method:"POST",
    credentials:"include",
    headers: authHeaders({"Content-Type":"application/json"}),
    body:JSON.stringify({aired:true})
  });

  const data = await readJsonSafe(res);
  if (!res.ok || !data.ok) {
    alert(data.message || "Cập nhật trạng thái air thất bại");
    return;
  }

  loadContent();
}

async function saveMetricInline(id){
  const views = document.getElementById(`metric_views_${id}`)?.value || "0";
  const likes = document.getElementById(`metric_likes_${id}`)?.value || "0";
  const comments = document.getElementById(`metric_comments_${id}`)?.value || "0";
  const shares = document.getElementById(`metric_shares_${id}`)?.value || "0";
  const orders = document.getElementById(`metric_orders_${id}`)?.value || "0";
  const revenue = document.getElementById(`metric_revenue_${id}`)?.value || "0";

  const res = await fetch(`/api/v1/channel-content/${id}/metric/`, {
    method:"POST",
    credentials:"include",
    headers: authHeaders({"Content-Type":"application/json"}),
    body:JSON.stringify({
      views: String(views).replaceAll(",", ""),
      likes: String(likes).replaceAll(",", ""),
      comments: String(comments).replaceAll(",", ""),
      shares: String(shares).replaceAll(",", ""),
      orders: String(orders).replaceAll(",", ""),
      revenue: String(revenue).replaceAll(",", "")
    })
  });

  const data = await readJsonSafe(res);

  if (!res.ok || !data.ok) {
    alert(data.message || "Lưu metric thất bại");
    return;
  }

  alert(`Đã lưu metric • views: ${formatNumber(views)}`);
  loadContent();
}

loadContent();
</script>
</body>
</html>
