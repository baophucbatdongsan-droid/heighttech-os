<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HeightTech OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui;
background:#0f172a;
color:white;
margin:0;
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-weight:600;
font-size:18px;
margin-bottom:30px;
}

.nav-item{
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:5px;
}

.nav-item:hover{
background:#1e293b;
}

.content{
flex:1;
padding:20px;
overflow:auto;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.timeline-item{
border-bottom:1px solid #334155;
padding:10px 0;
}

.notification{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">HeightTech</div>

<div class="nav-item">Dashboard</div>
<div class="nav-item">Shops</div>
<div class="nav-item">Clients</div>
<div class="nav-item">Work</div>
<div class="nav-item">Finance</div>
<div class="nav-item">Intelligence</div>
<div class="nav-item">Control Center</div>

</div>

<div class="content">

<div class="topbar">

<div>
<h2>Control Center</h2>
</div>

<div>
<span id="unread"></span>
</div>

</div>

<div class="cards">

<div class="card">
<h4>Shops</h4>
<div id="shops"></div>
</div>

<div class="card">
<h4>Risk</h4>
<div id="risk"></div>
</div>

<div class="card">
<h4>Open Tasks</h4>
<div id="tasks"></div>
</div>

<div class="card">
<h4>Actions</h4>
<div id="actions"></div>
</div>

</div>

<div class="grid">

<div class="panel">
<h3>Timeline</h3>
<div id="timeline"></div>
</div>

<div class="panel">
<h3>Notifications</h3>
<div id="notifications"></div>
</div>

</div>

</div>

<script>

const token="8fe3105ef040484b580384d3179cf15af13c46ef"

async function loadOS(){

const res=await fetch("/api/v1/os/control-center/",{
headers:{
Authorization:"Token "+token
}
})

const data=await res.json()

render(data)

}

function render(data){

const headline=data.headline||{}

document.getElementById("shops").innerText=headline.shops_total||0
document.getElementById("risk").innerText=headline.shops_risk||0
document.getElementById("tasks").innerText=headline.work_open||0
document.getElementById("actions").innerText=headline.actions_open||0

renderTimeline(data.timeline)
renderNotifications(data.notifications)

document.getElementById("unread").innerText=
"Unread: "+(data.notifications?.unread_count||0)

}

function renderTimeline(timeline){

const el=document.getElementById("timeline")

el.innerHTML=""

if(!timeline?.items) return

timeline.items.forEach(e=>{

const item=document.createElement("div")
item.className="timeline-item"

item.innerHTML=
"<b>"+e.name+"</b><br>"+(e.entity||"")

el.appendChild(item)

})

}

function renderNotifications(notifications){

const el=document.getElementById("notifications")

el.innerHTML=""

if(!notifications?.items) return

notifications.items.forEach(n=>{

const item=document.createElement("div")

item.className="notification"

item.innerHTML=
"<b>"+n.tieu_de+"</b><br>"+n.noi_dung

el.appendChild(item)

})

}

loadOS()

</script>

</body>
</html>
