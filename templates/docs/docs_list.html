{% load static %}
<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>HeightTech Docs</title>
  <link rel="stylesheet" href="{% static 'os/os.css' %}?v=1" />
  <style>
    .page-wrap{max-width:1180px;margin:0 auto;padding:24px;}
    .page-title{font-size:28px;font-weight:900;}
    .page-sub{margin-top:6px;color:var(--muted);line-height:1.5;}
    .cardx{margin-top:18px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.03);overflow:hidden;}
    .cardx-h{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);}
    .cardx-b{padding:16px;}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .stack{display:flex;flex-direction:column;gap:12px;}
    .item{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;background:rgba(255,255,255,.025);}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .muted2{color:var(--muted);font-size:13px;line-height:1.5;}
    .status-box{min-height:20px;margin-top:10px;font-size:13px;}
    @media (max-width: 900px){.grid2{grid-template-columns:1fr;}.page-wrap{padding:14px;}}
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-title">HeightTech Docs</div>
    <div class="page-sub">Tài liệu online cho báo giá, proposal, hợp đồng, phụ lục, báo cáo.</div>

    <div class="cardx">
      <div class="cardx-h"><b>Tạo document mới</b></div>
      <div class="cardx-b">
        <div class="grid2">
          <input id="docTitle" class="input" placeholder="Tên tài liệu, ví dụ: Báo giá vận hành TikTok Shop" />

          <select id="docType" class="input">
            <option value="doc">doc</option>
            <option value="proposal">proposal</option>
            <option value="quotation">quotation</option>
            <option value="contract">contract</option>
            <option value="appendix">appendix</option>
            <option value="report">report</option>
          </select>

          <input id="docLinkedType" class="input" placeholder="linked_target_type, ví dụ: contract" />
          <input id="docLinkedId" class="input" placeholder="linked_target_id, ví dụ: 4" />

          <textarea id="docHtml" class="input" style="min-height:180px;grid-column:1/-1;" placeholder="Dán HTML nội dung tài liệu vào đây..."></textarea>
        </div>

        <div class="row">
          <button class="btn primary" type="button" onclick="createDoc()">Tạo document</button>
          <a class="btn" href="/os/">Về OS</a>
        </div>

        <div id="createStatus" class="status-box muted2"></div>
      </div>
    </div>

    <div class="cardx">
      <div class="cardx-h"><b>Danh sách document</b></div>
      <div class="cardx-b">
        <div id="docList" class="stack"></div>
      </div>
    </div>
  </div>

  <script>
    const CURRENT_TENANT_ID = "{{ current_tenant_id|default:''|escapejs }}".trim();
    const LINKED_TARGET_TYPE = new URLSearchParams(window.location.search).get("linked_target_type") || "";
    const LINKED_TARGET_ID = new URLSearchParams(window.location.search).get("linked_target_id") || "";

    function getCookie(name) {
        const m = document.cookie.match(new RegExp("(^|;\\s*)" + name + "=([^;]+)"));
        return m ? decodeURIComponent(m[2]) : "";
    }

    function authHeaders(extra = {}) {
        const headers = Object.assign({}, extra || {});
        if (CURRENT_TENANT_ID) headers["X-Tenant-Id"] = CURRENT_TENANT_ID;
        const csrf = getCookie("csrftoken");
        if (csrf) headers["X-CSRFToken"] = csrf;
        return headers;
    }

    async function readJsonSafe(res) {
        const ct = res.headers.get("content-type") || "";
        if (ct.includes("application/json")) return await res.json();
        const txt = await res.text();
        throw new Error(txt || `HTTP ${res.status}`);
    }

    function esc(v){
        return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setCreateStatus(msg, type="info"){
        const el = document.getElementById("createStatus");
        el.textContent = msg || "";
        el.style.color = type === "err" ? "#ff8f9c" : type === "ok" ? "#8fe3a1" : "#8ab4ff";
    }

    async function loadDocs(){
        const box = document.getElementById("docList");
        const p = new URLSearchParams();
        if (LINKED_TARGET_TYPE) p.set("linked_target_type", LINKED_TARGET_TYPE);
        if (LINKED_TARGET_ID) p.set("linked_target_id", LINKED_TARGET_ID);

        const res = await fetch(`/api/v1/docs/?${p.toString()}`, {
        credentials: "include",
        headers: authHeaders(),
        cache: "no-store",
        });

        const data = await readJsonSafe(res);

        if (!res.ok || !data.ok) {
        box.innerHTML = `<div class="item">Không tải được document</div>`;
        return;
        }

        const items = data.items || [];
        if (!items.length) {
        box.innerHTML = `<div class="item">Chưa có document</div>`;
        return;
        }

        box.innerHTML = items.map(x => `
        <div class="item">
            <div><b>${esc(x.title)}</b></div>
            <div class="muted2" style="margin-top:6px;">
            Type: ${esc(x.doc_type || "-")}
            • Linked: ${esc(x.linked_target_type || "-")} ${esc(x.linked_target_id || "")}
            </div>
            <div class="row">
            <a class="btn primary" href="/os/docs/${x.id}/">Mở document</a>
            </div>
        </div>
        `).join("");
    }

    async function createDoc(){
        const payload = {
        title: document.getElementById("docTitle").value.trim(),
        doc_type: document.getElementById("docType").value,
        linked_target_type: document.getElementById("docLinkedType").value.trim() || LINKED_TARGET_TYPE,
        linked_target_id: document.getElementById("docLinkedId").value.trim() || LINKED_TARGET_ID || null,
        content_html: document.getElementById("docHtml").value
        };

        if (!payload.title) {
        setCreateStatus("Thiếu title", "err");
        return;
        }

        setCreateStatus("Đang tạo document...", "info");

        const res = await fetch("/api/v1/docs/create/", {
        method: "POST",
        credentials: "include",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify(payload),
        });

        const data = await readJsonSafe(res);
        if (!res.ok || !data.ok) {
        setCreateStatus(data.message || "Tạo document lỗi", "err");
        return;
        }

        setCreateStatus("Đã tạo document", "ok");
        window.location.href = `/os/docs/${data.item.id}/`;
    }

    if (LINKED_TARGET_TYPE && !document.getElementById("docLinkedType").value) {
        document.getElementById("docLinkedType").value = LINKED_TARGET_TYPE;
    }
    if (LINKED_TARGET_ID && !document.getElementById("docLinkedId").value) {
        document.getElementById("docLinkedId").value = LINKED_TARGET_ID;
    }

    loadDocs().catch(console.error);
    </script>
</body>
</html>
